<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0A0806"/>

  <!-- Crosshair ring -->
  <circle cx="16" cy="16" r="8" stroke="#D4A85A" stroke-width="1.2" opacity="0.4"/>
  <circle cx="16" cy="16" r="4.5" stroke="#D4A85A" stroke-width="1.2" opacity="0.7"/>

  <!-- Tick marks at cardinal points -->
  <line x1="16" y1="5" x2="16" y2="8"   stroke="#D4A85A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="27" stroke="#D4A85A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5"  y1="16" x2="8"  y2="16" stroke="#D4A85A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="27" y2="16" stroke="#D4A85A" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#D4A85A"/>
</svg>
